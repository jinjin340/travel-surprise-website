            border-radius: 50%; opacity: 0; transform: scale(0); transition: all 0.5s ease; z-index: 1; pointer-events: none;
        }
        .light-rays.show { opacity: 1; transform: scale(1); animation: spinRays 8s linear infinite; }
        
        .capsule { width: 150px; height: 150px; position: relative; z-index: 10; cursor: pointer; }
        .cap-top { 
            position: absolute; top: 0; left: 0; width: 100%; height: 50%; 
            background: radial-gradient(circle at 30% 30%, #ff4757, #c0392b); 
            border-radius: 75px 75px 0 0; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3); 
            border-bottom: 5px solid #bdc3c7; transform-origin: bottom center; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2; 
        }
        .cap-bottom { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; 
            background: radial-gradient(circle at 70% 70%, #ffffff, #ecf0f1); 
            border-radius: 0 0 75px 75px; box-shadow: inset 10px 10px 20px rgba(0,0,0,0.1); 
            transform-origin: top center; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1; 
        }
        
        .capsule.shake { animation: vibrate 0.1s linear infinite both; }
        .capsule.open .cap-top { transform: translateY(-100px) rotate(-25deg); opacity: 0; }
        .capsule.open .cap-bottom { transform: translateY(100px) rotate(25deg); opacity: 0; }

        .draw-result-text { 
            position: absolute; z-index: 20; font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 4px 15px rgba(255, 71, 87, 0.9), 0 0 40px #ffd32a;

        }
        .draw-result-text.show { opacity: 1; transform: scale(1); }

        }
        .btn-draw:active { transform: scale(0.95); }

        /* --- 画廊轮播组件 (新增) --- */
        .gallery-wrapper { position: relative; width: 100%; height: 50vh; background: #eee; overflow: hidden;}
        .xhs-gallery-container {
            width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; display: flex;

                    'Day4: 🏛️西溪湿地坐船感受自然之肺 -> 逛河坊街',
                    'Day5: 吃一顿正宗杭帮菜（龙井虾仁） -> 🚄返程'
                ]
            },
            'haerbin': {
                name: '哈尔滨', lng: 126.53, lat: 45.80, gradient: 'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)',
                title: '⛄现实版冰雪奇缘，零下二十度的浪漫',
                note: '极寒预警！但小羊别怕，暖宝宝帽子手套全就位，我就是你专属的人形自走暖炉。',
                tags: ['#哈尔滨旅游', '#冰雪大世界', '#东方莫斯科'],
                days: [
                    'Day1: ✈️抵达哈尔滨 -> ⛪索菲亚教堂广场喂鸽子拍大片',
                    'Day2: ❄️全副武装冲刺冰雪大世界 -> 体验超长冰滑梯',
                    'Day3: 🚶‍♀️漫步中央大街 -> 零下二十度吃马迭尔冰棍 -> 吃俄餐',
                    'Day4: ⛷️亚布力滑雪场体验速度与激情（我护着你）',
                    'Day5: 搓一顿铁锅炖大鹅暖暖身子 -> ✈️返程'
                ]
            }
        };

        const poolByMonth = {
            1: ['kunming', 'sanya', 'banna', 'beihai'],
            2: ['lijiang', 'xiamen', 'weihai', 'liuzhou'],
            3: ['nanjing', 'wuhan', 'dali', 'liuzhou'],
            4: ['guilin', 'banna', 'zhangjiajie', 'jiuzhaigou'],
            5: ['yazhuang', 'yabi', 'xiamen', 'changsha'],
            6: ['qingdao', 'guilin', 'shangrila', 'changsha'],
            7: ['kunming', 'lijiang', 'nanjing', 'nanchang'],
            8: ['weihai', 'dali', 'lijiang', 'beihai'],
            9: ['nanjing', 'wuhan', 'dali', 'liuzhou'],
            10: ['shouer', 'puji', 'yabi', 'weihai'],
            11: ['beijing', 'xian', 'zhangjiajie', 'xiamen'],
            12: ['hangzhou', 'nanchang', 'changsha', 'haerbin']
        };

        const getBJTimeStr = () => {
            const date = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"}));
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        };
        const getBJMonth = () => new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"})).getMonth() + 1;

        const btnDraw = document.getElementById('btn-draw');
        const capsule = document.getElementById('capsule');
        const rays = document.getElementById('light-rays');
        const resultText = document.getElementById('draw-result-text');
        const modal = document.getElementById('modal');
        const btnLock = document.getElementById('btn-lock');
        const homePage = document.getElementById('home-page');
        const destPage = document.getElementById('dest-page');
        const galleryContainer = document.getElementById('gallery-container');
        let finalDestKey = '';
        let mapObj = null;

        btnDraw.addEventListener('click', () => {
            const currentMonth = getBJMonth();
            const poolKeys = poolByMonth[currentMonth];
            if(!poolKeys) { alert('本月卡池尚未配置！'); return; }

            btnDraw.disabled = true;
            btnDraw.style.opacity = '0.5';

            finalDestKey = poolKeys[Math.floor(Math.random() * poolKeys.length)];
            const destName = locationsDB[finalDestKey].name;

            capsule.classList.add('shake');

            setTimeout(() => {
                capsule.classList.remove('shake');
                capsule.classList.add('open');
                
                rays.classList.add('show');
                resultText.innerText = destName;
                resultText.classList.add('show');

                setTimeout(() => {
                    document.getElementById('modal-desc').innerHTML = `北京时间 ${getBJTimeStr()} <br><br>命中注定，王梓涵将带小羊前往<br><strong>【${destName}】</strong><br>开启我们的独家浪漫副本！`;
                    modal.classList.add('active');
                }, 2500);

            }, 1500);
        });

        btnLock.addEventListener('click', () => {
            modal.classList.remove('active');
            const data = locationsDB[finalDestKey];

            document.getElementById('current-time-tag').innerText = `刚刚为小羊更新了这篇笔记`;
            
            // 默认显示 CSS 渐变加载状态
            galleryContainer.innerHTML = `
                <div class="loading-state" style="background: ${data.gradient}; width: 100%; height: 50vh;">
                    <div class="spinner"></div>
                    <div style="font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">正在通过卫星信号<br>为小羊获取【${data.name}】的绝美实景...</div>
                </div>
            `;

            document.getElementById('note-title').innerText = data.title;
            document.getElementById('note-desc').innerText = data.note;
            document.getElementById('note-tags').innerHTML = data.tags.map(t => `<span class="xhs-tag">${t}</span>`).join('');

            document.getElementById('itinerary-list').innerHTML = data.days.map((dayText, idx) => {
                const parts = dayText.split(': ');
                return `
                <div class="day-item">
                    <div class="day-title">${parts[0] || `Day ${idx+1}`}</div>
                    <div class="day-detail">${parts[1] || dayText}</div>
                </div>`;
            }).join('');

            homePage.classList.remove('active');
            setTimeout(() => {
                homePage.style.display = 'none';
                destPage.classList.add('active');
                window.scrollTo(0, 0);

                setTimeout(() => {
                    initAmap(data.lng, data.lat);
                }, 300);

                // 【核心逻辑】：高德 API 获取真实图片，并挂载轮播组件
                if (typeof AMap !== 'undefined') {
                    AMap.plugin(["AMap.PlaceSearch"], function() {
                        var placeSearch = new AMap.PlaceSearch({
                            pageSize: 10, pageIndex: 1, city: data.name, extensions: 'all'
                        });
                        
                        placeSearch.search('景点', function(status, result) {
                            if (status === 'complete' && result.info === 'OK') {
                                let photos = [];
                                for (let i = 0; i < result.poiList.pois.length; i++) {
                                    let poi = result.poiList.pois[i];
                                    if (poi.photos && poi.photos.length > 0) {
                                        photos.push(poi.photos[0].url);
                                    }
                                    if (photos.length >= 5) break; 
                                }
                                
                                if (photos.length > 0) {
                                    // 1. 注入图片
                                    const galleryHtml = photos.map((img, idx) => `
                                        <div class="xhs-image-wrapper">
                                            <img src="${img}" alt="风景">
                                            <div class="image-counter">${idx + 1} / ${photos.length}</div>
                                        </div>
                                    `).join('');
                                    galleryContainer.innerHTML = galleryHtml;

                                    // 2. 注入指示点
                                    const dotsHtml = photos.map((_, idx) => `<div class="dot ${idx === 0 ? 'active' : ''}" data-idx="${idx}"></div>`).join('');
                                    document.getElementById('gallery-dots').innerHTML = dotsHtml;

                                    // 3. 显示左右切换箭头
                                    const navLeft = document.getElementById('nav-left');
                                    const navRight = document.getElementById('nav-right');
                                    navLeft.style.display = 'flex';
                                    navRight.style.display = 'flex';

                                    // 4. 轮播控制逻辑
                                    const dots = document.querySelectorAll('.dot');
                                    let currentIndex = 0;

                                    const updateGallery = (index) => {
                                        if(index < 0) index = 0;
                                        if(index >= photos.length) index = photos.length - 1;
                                        currentIndex = index;
                                        galleryContainer.scrollTo({
                                            left: galleryContainer.clientWidth * currentIndex,
                                            behavior: 'smooth'
                                        });
                                        dots.forEach(d => d.classList.remove('active'));
                                        if(dots[currentIndex]) dots[currentIndex].classList.add('active');
                                    };

                                    // 监听手机触屏滑动
                                    galleryContainer.addEventListener('scroll', () => {
                                        let index = Math.round(galleryContainer.scrollLeft / galleryContainer.clientWidth);
                                        if(index !== currentIndex) {
                                            currentIndex = index;
                                            dots.forEach(d => d.classList.remove('active'));
                                            if(dots[currentIndex]) dots[currentIndex].classList.add('active');
                                        }
                                    });

                                    // 监听点击事件
                                    navLeft.onclick = () => updateGallery(currentIndex - 1);
                                    navRight.onclick = () => updateGallery(currentIndex + 1);
                                    dots.forEach(dot => {
                                        dot.onclick = (e) => updateGallery(parseInt(e.target.getAttribute('data-idx')));
                                    });
                                }
                            }
                        });
                    });
                }
            }, 500);
        });

        function initAmap(lng, lat) {
            if (typeof AMap === 'undefined') {
                document.getElementById('map-container').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">请先在代码顶部填入你的高德 API Key 才能显示地图哦</div>';
                return;
            }
            mapObj = new AMap.Map('map-container', { zoom: 11, center: [lng, lat], viewMode: '2D' });
            const marker = new AMap.Marker({ position: new AMap.LngLat(lng, lat), title: '小羊的下一站' });
            mapObj.add(marker);
        }
    </script>
</body>
</html>
